spring.application.name=back-end

# Allow bean definition overriding (required for Spring Boot 3.4.11 compatibility)
spring.main.allow-bean-definition-overriding=true

# Enable detailed logging for debugging
logging.level.org.springframework.web=DEBUG
logging.level.es.ull.project=DEBUG

# Error handling configuration
# - include-message: always show error messages
# - include-stacktrace: never show stack traces in responses (security and cleanliness)
# - include-binding-errors: never show binding errors details
# The GlobalExceptionHandler will provide clean, user-friendly error messages
server.error.include-message=always
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# External algorithm docker execution
algorithm.docker.project-directory=..
algorithm.docker.compose-file=docker-compose.yml
algorithm.docker.service-name=algorithm
