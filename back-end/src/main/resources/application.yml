server:
  error:
    include-message: always
    include-stacktrace: never
    include-binding-errors: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

spring:
  application:
    name: back-end

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  
  # Allow bean definition overriding (required for Spring Boot 3.4.11 compatibility)
  main:
    allow-bean-definition-overriding: true
  
  # MongoDB configuration
  data:
    mongodb:
      uri: mongodb://localhost:27017/db-application # URI of MongoDB
      database: db-application # Database name

# Enable detailed logging for debugging
logging:
  level:
    org.springframework.web: DEBUG
    es.ull.project: DEBUG

algorithm:
  docker:
    project-directory: ..
    compose-file: docker-compose.yml
    service-name: algorithm
