services:
  # Algorithm
  algorithm:
    build:
      context: ./algorithm
    image: sensor-app_algorithm:latest
    profiles: ["algorithm", "full"]

  # Front-end
  front-end:
    image: kaizten/sensor-app_front-end:latest
    container_name: front-end
    ports:
      - 80:80
    depends_on:
      - back-end
    profiles: ["full"]
  # Back-end
  back-end:
    image: kaizten/sensor-app_back-end:latest
    container_name: back-end
    ports:
      - 8080:8080    
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/db-application
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - mongodb
    profiles: ["back-end", "full"]
  
  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: mongo
    command: mongod --port 27017
    ports:
      - 27017:27017
    volumes:
      - mongodb_volume:/data/db
    profiles: ["database", "back-end", "full"]
  # Watchtower
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always    
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_DEBUG: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30
volumes:
  mongodb_volume: {}
networks:
  default:
    name: fullstack-network
