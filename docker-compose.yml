services:
  # Algorithm
  algorithm:
    build:
      context: ./algorithm
    image: sensor-app_algorithm:latest
    profiles: ["algorithm"]

  # Front-end (build locally — kaizten/sensor-app_front-end is private/unavailable)
  # If npm fails with "checksum mismatch" on GitHub Packages, build on the host first:
  #   cd front-end && npm install && npm run build && cd ..
  #   FRONTEND_DOCKERFILE=Dockerfile.dist docker compose --profile full up -d --build
  front-end:
    build:
      context: ./front-end
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
      secrets:
        - github_token
    image: sensor-app_front-end:local
    container_name: front-end
    ports:
      - 80:80
    depends_on:
      - back-end
    profiles: ["full"]
  # Back-end (build locally — image kaizten/sensor-app_back-end is private)
  # Profile "docker" + socket: runs algorithm via "docker run sensor-app_algorithm:latest"
  back-end:
    build:
      context: ./back-end
      dockerfile: Dockerfile
      secrets:
        - github_token
    image: sensor-app_back-end:local
    container_name: back-end
    ports:
      - 8080:8080    
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/db-application
      - SPRING_PROFILES_ACTIVE=dev,docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mongodb
    profiles: ["back-end", "full"]

  # Back-end for Newman / REST API tests (isolated MongoDB database, port 8081 on host)
  back-end-api-test:
    build:
      context: ./back-end
      dockerfile: Dockerfile
      secrets:
        - github_token
    image: sensor-app_back-end:local
    container_name: back-end-api-test
    ports:
      - 8081:8080
    environment:
      - SPRING_PROFILES_ACTIVE=api-test
      # application-api-test.yml uses port 8081 on the host; inside Docker we listen on 8080
      - SERVER_PORT=8080
      - SPRING_DATA_MONGODB_URI=mongodb://mongo-api-test:27017/db-application-api-test
      - SPRING_DATA_MONGODB_DATABASE=db-application-api-test
    depends_on:
      - mongodb-api-test
    profiles: ["api-test"]
  
  # MongoDB (host port 27018 avoids conflict with a local MongoDB on 27017)
  mongodb:
    image: mongo:latest
    container_name: mongo
    command: mongod --port 27017
    ports:
      - 27018:27017
    volumes:
      - mongodb_volume:/data/db
    profiles: ["database", "back-end", "full"]

  # Internal MongoDB for Newman / REST API tests (no host port, no conflict with local MongoDB)
  mongodb-api-test:
    image: mongo:latest
    container_name: mongo-api-test
    command: mongod --port 27017
    volumes:
      - mongodb_api_test_volume:/data/db
    profiles: ["api-test"]
  # Watchtower (opt-in — avoids starting on every compose up)
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always    
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_DEBUG: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30
    profiles: ["watchtower"]

secrets:
  github_token:
    environment: GITHUB_TOKEN

volumes:
  mongodb_volume: {}
  mongodb_api_test_volume: {}
networks:
  default:
    name: fullstack-network
